<!DOCTYPE html>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset your password — Orlando Magic Planner</title>

<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="/img/Orlando Magic Planner.png">
<style>
:root {
  --navy:      #03295b;
  --navy-dark: #021e45;
  --navy-mid:  #054294;
  --accent:    #FF5C3A;
  --accent2:   #ff7c5e;
  --text:      #EEF4FF;
  --text2:     #7B9BC4;
  --text3:     #3e5f88;
  --font-head: 'Clash Display', sans-serif;
  --font-body: 'Inter', system-ui, sans-serif;
}

body {
  margin: 0;
  font-family: var(--font-body);
  background: #010e1f;
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 2rem;
}

.reset-card {
  background: #0d1829;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 16px;
  padding: 2.5rem;
  width: 100%;
  max-width: 420px;
  text-align: center;
}

.reset-logo {
  width: 70px;
  height: 70px;
  object-fit: contain;
  filter: brightness(0) invert(1);
  opacity: 0.9;
  margin-bottom: 1.5rem;
}

.reset-title {
  font-family: var(--font-head);
  font-size: 1.8rem;
  font-weight: 700;
  margin-bottom: 0.75rem;
}

.reset-sub {
  font-size: 0.95rem;
  color: var(--text2);
  margin-bottom: 2rem;
  line-height: 1.6;
}

label {
  display: block;
  text-align: left;
  margin-bottom: 0.4rem;
  font-size: 0.85rem;
  color: var(--text2);
}

input {
  width: 100%;
  padding: 0.75rem;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.12);
  background: #0a1320;
  color: var(--text);
  margin-bottom: 1.2rem;
  font-size: 0.95rem;
}

.btn-accent {
  width: 100%;
  padding: 0.85rem;
  background: var(--accent);
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}

.btn-accent:hover {
  background: var(--accent2);
}

.reset-message {
  margin-top: 1rem;
  font-size: 0.85rem;
  color: var(--text2);
}

.back-link {
  display: inline-block;
  margin-top: 1.5rem;
  font-size: 0.85rem;
  color: var(--text3);
  text-decoration: underline;
}
</style>
</head>

<body>

<div class="reset-card">
  <img class="reset-logo" src="img/Orlando Magic Planner.png">

  <h2 class="reset-title">Set a new password</h2>
  <p class="reset-sub">Enter your new password below. Once updated, you’ll be able to sign in again.</p>

  <label>New password</label>
  <input type="password" id="newPass" placeholder="Enter a new password">

  <button class="btn-accent" onclick="updatePassword()">Update password →</button>

  <p id="resetMessage" class="reset-message"></p>

  <a class="back-link" href="/">Back to sign in</a>
</div>

<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

  const supabase = createClient(
    "https://ztomblmoegchycarlskc.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp0b21ibG1vZWdjaHljYXJsc2tjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxOTUxNTAsImV4cCI6MjA4OTc3MTE1MH0.pDKDGl8t6k6E6TEArsT_hZMdaeY_ZUfbUg1aAG3LKRM"
  );

  async function updatePassword() {
    const newPass = document.getElementById("newPass").value;
    const msg = document.getElementById("resetMessage");

    if (!newPass) {
      msg.textContent = "Please enter a new password.";
      return;
    }

    const { data, error } = await supabase.auth.updateUser({
      password: newPass
    });

    if (error) {
      msg.textContent = error.message;
    } else {
      msg.textContent = "Password updated! You can now sign in.";
    }
  }

  // expose for inline onclick
  window.updatePassword = updatePassword;
</script>

</body>
</html>
