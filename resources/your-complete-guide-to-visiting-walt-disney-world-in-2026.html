<div id="nav-placeholder"></div>
<script>
  fetch('/nav.html')
    .then(r => r.text())
    .then(html => {
      document.getElementById('nav-placeholder').innerHTML = html;

      // Runs after nav is injected into the page
      const burger  = document.getElementById('navBurger');
      const drawer  = document.getElementById('navDrawer');
      const overlay = document.getElementById('navOverlay');

      function openDrawer() {
        overlay.style.display = 'block';
        overlay.offsetHeight; // force reflow so transition fires
        drawer.classList.add('open');
        overlay.classList.add('open');
        burger.classList.add('open');
        burger.setAttribute('aria-expanded', 'true');
        document.body.style.overflow = 'hidden';
      }

      function closeDrawer() {
        drawer.classList.remove('open');
        overlay.classList.remove('open');
        burger.classList.remove('open');
        burger.setAttribute('aria-expanded', 'false');
        document.body.style.overflow = '';
        setTimeout(() => { overlay.style.display = 'none'; }, 300);
      }

      burger.addEventListener('click', () => {
        drawer.classList.contains('open') ? closeDrawer() : openDrawer();
      });

      overlay.addEventListener('click', closeDrawer);

      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeDrawer();
      });
    });
</script>

<!--POST INJECTION FROM SANITY.IO-->
<script type="module">
  import { createClient } from "https://esm.sh/@sanity/client";
  import { toHTML } from "https://esm.sh/@portabletext/to-html";
  import imageUrlBuilder from "https://esm.sh/@sanity/image-url";

  // Connect to Sanity
  const client = createClient({
    projectId: "50x08vqr",
    dataset: "production",
    apiVersion: "2023-10-01",
    useCdn: true,
  });

  // Image builder
  const builder = imageUrlBuilder(client);

  // urlFor returns a FINAL URL string
  function urlFor(source, width = 1200) {
    return builder.image(source).width(width).url();
  }

  // Reading time helper
  function calculateReadingTime(text) {
    const words = text.trim().split(/\s+/).length;
    return Math.max(1, Math.ceil(words / 200));
  }

  // Extract slug from URL
  const slug = window.location.pathname.split("/").pop().replace(".html", "");

  async function loadPost() {
    const post = await client.fetch(
      `*[_type == "post" && slug.current == $slug][0]{
        title,
        body,
        mainImage,
        categories[]->{
          _id,
          title,
          slug
        }
      }`,
      { slug }
    );

    if (!post) {
      document.querySelector("#post").innerHTML = "<p>Post not found.</p>";
      return;
    }

    // Convert Portable Text → HTML
    const html = toHTML(post.body, {
      components: {
        types: {
          image: ({ value }) => `
            <img src="${urlFor(value, 900)}" alt="${value.alt || ''}" />
          `
        }
      }
    });

    // Reading time
    const tempDiv = document.createElement("div");
    tempDiv.innerHTML = html;
    const plainText = tempDiv.innerText;
    const readingTime = calculateReadingTime(plainText);

    // Categories
    const categoriesHTML = post.categories?.length
      ? `<div class="post-categories">
           <span class="cat-label">Categories:</span>
           ${post.categories
             .map(cat => {
               const slug = cat.slug?.current;
               if (!slug) return `<span>${cat.title}</span>`;
               return `<a href="/resources/category/${slug}.html">${cat.title}</a>`;
             })
             .join(" • ")}
         </div>`
      : "";

    // Hero image (safe)
    let heroHTML = "";
    if (post.mainImage && post.mainImage.asset) {
      heroHTML = `
        <img class="post-hero" 
             src="${urlFor(post.mainImage, 1200)}" 
             alt="${post.title}" />
      `;
    }

    // Related posts (based on shared categories)
    const relatedPosts = await client.fetch(
      `*[_type == "post" &&
         slug.current != $slug &&
         count(categories[@._ref in $catIds]) > 0][0...3]{
           title,
           slug
         }`,
      {
        slug,
        catIds: post.categories?.map(c => c._id) || []
      }
    );

    const relatedHTML = relatedPosts.length
      ? `
        <div class="related-posts">
          <h3>Related Posts</h3>
          <ul>
            ${relatedPosts
              .map(p => `<li><a href="/resources/${p.slug.current}.html">${p.title}</a></li>`)
              .join("")}
          </ul>
        </div>
      `
      : "";

    // Render the post
    document.querySelector("#post").innerHTML = `
      ${heroHTML}
      ${categoriesHTML}
      <div class="reading-time">${readingTime} min read</div>
      <h1>${post.title}</h1>
      ${html}
      ${relatedHTML}
      <a href="/resources/" class="back-link">← Back to Resources</a>
    `;
  }

  loadPost();
</script>
<!--END POST INJECTION FROM SANITY.IO-->
