<!-- Slide Out Menu Start -->
<div id="nav-placeholder"></div>
<script>
  fetch('/nav.html')
    .then(r => r.text())
    .then(html => {
      document.getElementById('nav-placeholder').innerHTML = html;

      // Runs after nav is injected into the page
      const burger  = document.getElementById('navBurger');
      const drawer  = document.getElementById('navDrawer');
      const overlay = document.getElementById('navOverlay');

      function openDrawer() {
        overlay.style.display = 'block';
        overlay.offsetHeight; // force reflow so transition fires
        drawer.classList.add('open');
        overlay.classList.add('open');
        burger.classList.add('open');
        burger.setAttribute('aria-expanded', 'true');
        document.body.style.overflow = 'hidden';
      }

      function closeDrawer() {
        drawer.classList.remove('open');
        overlay.classList.remove('open');
        burger.classList.remove('open');
        burger.setAttribute('aria-expanded', 'false');
        document.body.style.overflow = '';
        setTimeout(() => { overlay.style.display = 'none'; }, 300);
      }

      burger.addEventListener('click', () => {
        drawer.classList.contains('open') ? closeDrawer() : openDrawer();
      });

      overlay.addEventListener('click', closeDrawer);

      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeDrawer();
      });
    });
</script>

<div class="resources-container">
  <input 
    id="searchInput" 
    class="resources-search" 
    type="text" 
    placeholder="Search articles..."
  >

  <div id="postsGrid" class="posts-grid"></div>

  <div id="pagination" class="pagination"></div>
</div>

<script type="module">
  import { createClient } from "https://esm.sh/@sanity/client";
  import imageUrlBuilder from "https://esm.sh/@sanity/image-url";

  const client = createClient({
    projectId: "50x08vqr",
    dataset: "production",
    apiVersion: "2023-10-01",
    useCdn: true,
  });

  const builder = imageUrlBuilder(client);
  const urlFor = (src, w = 600) => builder.image(src).width(w).url();

  function readingTime(text) {
    const words = text.trim().split(/\s+/).length;
    return Math.max(1, Math.ceil(words / 200));
  }

  let allPosts = [];
  let filteredPosts = [];
  let currentPage = 1;
  const postsPerPage = 6;

  async function loadPosts() {
    allPosts = await client.fetch(`
      *[_type == "post"] | order(publishedAt desc){
        title,
        body,
        mainImage,
        "slug": slug.current,
        categories[]->{
          title,
          slug
        }
      }
    `);

    filteredPosts = allPosts;
    renderPage();
  }

  function renderPage() {
    const grid = document.getElementById("postsGrid");
    const pagination = document.getElementById("pagination");

    const start = (currentPage - 1) * postsPerPage;
    const end = start + postsPerPage;
    const pagePosts = filteredPosts.slice(start, end);

    grid.innerHTML = pagePosts
      .map(post => {
        const temp = document.createElement("div");
        temp.innerHTML = post.body?.map(b => b.children?.map(c => c.text).join(" ")).join(" ") || "";
        const time = readingTime(temp.innerText);

        const cats = post.categories?.length
          ? post.categories.map(c => c.title).join(" • ")
          : "";

        const thumb = post.mainImage
          ? `<img class="post-thumb" src="${urlFor(post.mainImage, 800)}" alt="${post.title}">`
          : "";

        return `
          <a class="post-card" href="/resources/${post.slug}.html">
            ${thumb}
            <div class="post-card-content">
              <div class="post-card-cats">${cats}</div>
              <h2>${post.title}</h2>
              <div class="post-card-meta">${time} min read</div>
            </div>
          </a>
        `;
      })
      .join("");

    const totalPages = Math.ceil(filteredPosts.length / postsPerPage);

    pagination.innerHTML = `
      <button ${currentPage === 1 ? "disabled" : ""} onclick="prevPage()">Previous</button>
      <button ${currentPage === totalPages ? "disabled" : ""} onclick="nextPage()">Next</button>
    `;
  }

  window.prevPage = () => {
    currentPage--;
    renderPage();
  };

  window.nextPage = () => {
    currentPage++;
    renderPage();
  };

  document.getElementById("searchInput").addEventListener("input", e => {
    const q = e.target.value.toLowerCase();

    filteredPosts = allPosts.filter(post => {
      const text = JSON.stringify(post).toLowerCase();
      return text.includes(q);
    });

    currentPage = 1;
    renderPage();
  });

  loadPosts();
</script>
